name: Firmware publish

on:
  push:
    paths:
      - 'firmware/**'
      - 'scripts/**'
      - 'manifest.json'
      - 'firmware-*.json'
      - '.github/workflows/firmware-publish.yml'
      # Web interface files
      - 'index.html'
      - '*.js'
      - 'css/**'
      - '*.png'
      - '_headers'
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  test:
    # Surfaces unit-test results in CI. continue-on-error is set so pre-existing
    # failing tests do not block firmware deployments while they are being
    # cleaned up; remove the flag once the suite is fully green.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        run: npm test -- --ci

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync firmware assets from release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/sync-from-releases.py \
            --repo "${GITHUB_REPOSITORY}" \
            --release-id "${{ github.event.release.id }}" \
            --target-dir firmware


      - name: Validate firmware naming policy
        run: |
          set -euo pipefail
          node scripts/validate-naming-policy.js firmware/configurations

      - name: Generate firmware manifests
        run: |
          set -euo pipefail
          python scripts/gen-manifests.py \
            --firmware-dir firmware \
            --manifest-path manifest.json \
            --manifest-prefix firmware- \
            --summary

      - name: Report manifest metadata findings
        # Trust-signal validation: description / modules / file-size / release-note
        # checks. Runs in warn-only mode against the freshly generated manifest so
        # findings are visible in CI logs without blocking firmware deployment.
        # Tighten to --strict-validate once existing stable builds gain release notes.
        continue-on-error: true
        run: |
          set -euo pipefail
          python scripts/gen-manifests.py \
            --firmware-dir firmware \
            --manifest-path manifest.json \
            --manifest-prefix firmware- \
            --dry-run

      - name: Validate release-note channel policy
        run: |
          set -euo pipefail
          invalid_preview_notes=$(find firmware/configurations -maxdepth 1 -type f \( -name '*-preview.md' -o -name '*-beta.md' -o -name '*-dev.md' \))
          if [ -n "${invalid_preview_notes}" ]; then
            echo "❌ Preview/Beta/Dev release notes are not allowed in firmware/configurations:" >&2
            echo "${invalid_preview_notes}" >&2
            echo "Move non-stable notes to firmware/previews/." >&2
            exit 1
          fi
          echo "✅ Release-note policy validated (stable-only in firmware/configurations)."

      - name: List firmware & dry-run summary
        run: |
          set -euo pipefail
          echo "== .bin files =="
          find firmware -type f -name '*.bin' -printf '%p\n' | sort
          echo "== gen-manifests dry-run summary =="
          python scripts/gen-manifests.py \
            --firmware-dir firmware \
            --manifest-path manifest.json \
            --manifest-prefix firmware- \
            --summary --dry-run

      - name: Assert required configs present
        run: |
          set -euo pipefail
          # =============================================================
          # Required configuration allowlist
          # =============================================================
          # Each entry must match a build.config_string in manifest.json
          # exactly. Use canonical SKU tokens (see CLAUDE.md):
          #   Power tokens: USB, POE, PWR
          #   Module tokens: AirIQ, VentIQ, Fan, LED
          # Drop entries when their firmware is permanently retired; do
          # not add Base/Pro variant tokens (AirIQPro / VentIQBase / etc.)
          # — the product taxonomy is flat, one SKU per product.
          # Bathroom mode toggles AirIQ <-> VentIQ visibility on Ceiling;
          # the two SKUs are mutually exclusive.
          # =============================================================

          REQUIRED_CONFIGS=(
            "Ceiling-POE-AirIQ"
            "Ceiling-POE-VentIQ"
            "Ceiling-PWR-AirIQ"
            "Ceiling-S3-Full"
            "Ceiling-USB"
            "Ceiling-USB-AirIQ"
            "Ceiling-USB-Fan"
            "Ceiling-Voice-POE-AirIQ"
            "Ceiling-Voice-USB"
            "Core-Ceiling"
            "Core-Ceiling-POE"
            "Core-Ceiling-PWR"
            "Core-Ceiling-USB"
            "Core-Ceiling-VentIQ"
            "Core-Wall"
            "Core-Wall-POE"
            "Core-Wall-PWR"
            "Core-Wall-USB"
            "CoreVoice-Ceiling"
            "CoreVoice-Ceiling-POE"
            "CoreVoice-Ceiling-PWR"
            "CoreVoice-Ceiling-USB"
            "CoreVoice-Wall"
            "CoreVoice-Wall-POE"
            "CoreVoice-Wall-PWR"
            "CoreVoice-Wall-USB"
            "Fan-PWM"
            "Mini-AirIQ"
            "Mini-AirIQ-Advanced"
            "Mini-AirIQ-Basic"
            "Mini-AirIQ-LD2412"
            "POE"
            "Rescue"
            "Wall-POE-AirIQ"
            "Wall-PWR"
            "Wall-PWR-AirIQ"
            "Wall-USB"
            "Wall-USB-AirIQ"
            "Wall-USB-Fan"
            "Wall-Voice-POE-AirIQ"
            "Wall-Voice-USB"
          )

          missing=0
          for k in "${REQUIRED_CONFIGS[@]}"; do
            if ! grep -qi "\"config_string\": *\"$k\"" manifest.json; then
              echo "❌ Missing config: $k" >&2
              missing=$((missing + 1))
            else
              echo "✓ Found: $k"
            fi
          done

          if [ $missing -gt 0 ]; then
            echo ""
            echo "❌ $missing required config(s) missing from manifest.json" >&2
            exit 1
          fi

          echo ""
          echo "✅ All ${#REQUIRED_CONFIGS[@]} required configurations present"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload repo root so the fresh manifest.json is included
          path: ./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
